name: smart_glass_app
description: "AI Smart Glass Assistant - OpenRouter vision + on-device face recognition."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.6.0
  google_mlkit_face_detection: ^0.13.2
  tflite_flutter: ^0.11.0
  image: ^4.5.3
  path_provider: ^2.1.5
  speech_to_text: ^7.3.0
  flutter_tts: ^4.2.5
  porcupine_flutter: ^4.0.0
  permission_handler: ^12.0.1
  flutter_background_service: ^5.1.0
  shared_preferences: ^2.5.4
  flutter_local_notifications: ^20.0.0
  image_picker: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/
